# Tool configuration for black and ruff. Project metadata and dependencies
# remain in requirements.txt; this file is intentionally tool-config-only.

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]
